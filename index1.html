<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vertex Tournaments</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* 1. ГЛАВНЫЕ ЦВЕТА (Черно-синий стиль) */
        :root {
            --bg-deep: #05050a; /* Очень глубокий темный цвет, почти черный */
            --bg-panel: rgba(10, 15, 30, 0.6); /* Стеклянные синие панели */
            --neon-blue: #00f0ff; /* Яркий кибер-синий для свечения */
            --dark-blue: #0057ff; /* Насыщенный синий для акцентов */
            --text-main: #ffffff;
            --text-muted: #8b9bb4; /* Серо-синий текст */
            --glass-border: rgba(0, 240, 255, 0.15); /* Прозрачная синяя рамка */
        }

        /* 2. БАЗОВЫЕ НАСТРОЙКИ */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        /* 3. КРАСИВЫЙ ФОН С ПОДСВЕТКОЙ */
        body {
            background-color: var(--bg-deep);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            /* Два больших синих неоновых пятна на фоне для объема */
            background-image: 
                radial-gradient(circle at 10% 0%, rgba(0, 87, 255, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 90% 100%, rgba(0, 240, 255, 0.1) 0%, transparent 40%);
        }
        /* 4. СТИЛИ ДЛЯ ШАПКИ (Header) */
        .top-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 20px 15px;
            background: linear-gradient(180deg, rgba(5,5,10,0.9) 0%, transparent 100%);
            z-index: 10;
        }

        /* 5. ЛОГОТИП VERTEX */
        .logo-box {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-icon {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, var(--neon-blue), var(--dark-blue));
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: 900;
            font-size: 18px;
            color: #fff;
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.4);
        }

        .logo-text {
            font-size: 22px;
            font-weight: 800;
            letter-spacing: 2px;
            text-transform: uppercase;
            /* Текст с синим переливом */
            background: linear-gradient(90deg, #fff, var(--neon-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>
<body>
    <header class="top-header">
        <div class="logo-box">
            <div class="logo-icon">V</div>
            <div class="logo-text">Vertex</div>
        </div>
    </header>
    </body>
</html>
