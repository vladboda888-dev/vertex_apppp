<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vertex Tournaments</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* =========================================
           1. ПРЕМИАЛЬНАЯ ПАЛИТРА (Строгий темно-синий)
           ========================================= */
        :root {
            --bg-main: #0b0f19; /* Очень глубокий темно-синий фон */
            --bg-panel: #131b2c; /* Цвет карточек (чуть светлее фона) */
            --bg-panel-hover: #1e293b;
            --accent-blue: #3b82f6; /* Благородный синий */
            --accent-light: #60a5fa; /* Светло-синий для свечений */
            --text-main: #f8fafc; /* Чистый белый текст */
            --text-muted: #94a3b8; /* Спокойный серый текст */
            --border-light: rgba(255, 255, 255, 0.05);
            --border-active: rgba(59, 130, 246, 0.3);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', Roboto, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* =========================================
           2. СТРОГАЯ ШАПКА
           ========================================= */
        .top-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            background: var(--bg-main);
            border-bottom: 1px solid var(--border-light);
            z-index: 10;
        }

        .logo-box {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-icon {
            width: 30px;
            height: 30px;
            background: linear-gradient(135deg, var(--accent-light), var(--accent-blue));
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: 800;
            font-size: 16px;
            color: #fff;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3);
        }

        .logo-text {
            font-size: 20px;
            font-weight: 800;
            letter-spacing: 1px;
            color: #fff;
        }

        /* Область для контента */
        .content-area {
            flex-grow: 1;
            overflow-y: auto;
            padding: 20px 20px 100px; /* Отступ под меню */
        }

        .tab {
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .tab.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* =========================================
           3. МИНИМАЛИСТИЧНОЕ НИЖНЕЕ МЕНЮ
           ========================================= */
        .bottom-nav {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 92%;
            max-width: 450px;
            height: 65px;
            background: rgba(19, 27, 44, 0.85); /* Полупрозрачная панель */
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-light);
            border-radius: 20px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 0 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            z-index: 100;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 45px;
            height: 100%;
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
        }

        .nav-icon {
            font-size: 22px;
            transition: all 0.3s ease;
        }

        .nav-text {
            font-size: 10px;
            font-weight: 600;
            margin-top: 4px;
            transition: all 0.3s ease;
            opacity: 0; /* Скрыт по умолчанию для чистоты */
            position: absolute;
            bottom: 8px;
        }

        /* Активное состояние кнопки */
        .nav-item.active {
            color: var(--accent-light);
        }

        .nav-item.active .nav-icon {
            transform: translateY(-8px);
            color: var(--accent-light);
            filter: drop-shadow(0 0 8px rgba(96, 165, 250, 0.4));
        }

        .nav-item.active .nav-text {
            opacity: 1;
        }

        /* Маленькая элегантная точка под активной вкладкой */
        .nav-item::after {
            content: '';
            position: absolute;
            bottom: 4px;
            width: 4px;
            height: 4px;
            border-radius: 50%;
            background: var(--accent-light);
            opacity: 0;
            transition: all 0.3s ease;
        }

        .nav-item.active::after {
            opacity: 1;
        }
    </style>
</head>
<body>

    <header class="top-header">
        <div class="logo-box">
            <div class="logo-icon">V</div>
            <div class="logo-text">Vertex</div>
        </div>
    </header>

    <div class="content-area">
        <div id="tab-tournaments" class="tab active">
            <h2 style="color: var(--text-muted); text-align: center; margin-top: 50px;">Загрузка турниров...</h2>
        </div>
        <div id="tab-news" class="tab"></div>
        <div id="tab-profile" class="tab"></div>
        <div id="tab-tribunal" class="tab"></div>
        <div id="tab-chat" class="tab"></div>
        <div id="tab-admin" class="tab"></div>
    </div>

    <div class="bottom-nav">
        <div class="nav-item active" onclick="switchTab('tournaments', this)">
            <div class="nav-icon">🏆</div>
            <div class="nav-text">Игры</div>
        </div>
        <div class="nav-item" onclick="switchTab('news', this)">
            <div class="nav-icon">📰</div>
            <div class="nav-text">Лента</div>
        </div>
        <div class="nav-item" onclick="switchTab('profile', this)">
            <div class="nav-icon">👤</div>
            <div class="nav-text">Профиль</div>
        </div>
        <div class="nav-item" onclick="switchTab('tribunal', this)">
            <div class="nav-icon">🔨</div>
            <div class="nav-text">Баны</div>
        </div>
        <div class="nav-item" onclick="switchTab('chat', this)">
            <div class="nav-icon">💬</div>
            <div class="nav-text">Чат</div>
        </div>
        <div class="nav-item" onclick="switchTab('admin', this)">
            <div class="nav-icon">👑</div>
            <div class="nav-text">Админ</div>
        </div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        function switchTab(tabId, element) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            
            let targetTab = document.getElementById('tab-' + tabId);
            if(targetTab) targetTab.classList.add('active');
            element.classList.add('active');
            
            if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
        }
    </script>
</body>
</html>
