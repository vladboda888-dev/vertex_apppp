<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vertex Tournaments</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* 1. ГЛАВНЫЕ ЦВЕТА (Черно-синий стиль) */
        :root {
            --bg-deep: #05050a; /* Очень глубокий темный цвет, почти черный */
            --bg-panel: rgba(10, 15, 30, 0.6); /* Стеклянные синие панели */
            --neon-blue: #00f0ff; /* Яркий кибер-синий для свечения */
            --dark-blue: #0057ff; /* Насыщенный синий для акцентов */
            --text-main: #ffffff;
            --text-muted: #8b9bb4; /* Серо-синий текст */
            --glass-border: rgba(0, 240, 255, 0.15); /* Прозрачная синяя рамка */
        }

        /* 2. БАЗОВЫЕ НАСТРОЙКИ */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        /* 3. КРАСИВЫЙ ФОН С ПОДСВЕТКОЙ */
        body {
            background-color: var(--bg-deep);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            /* Два больших синих неоновых пятна на фоне для объема */
            background-image: 
                radial-gradient(circle at 10% 0%, rgba(0, 87, 255, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 90% 100%, rgba(0, 240, 255, 0.1) 0%, transparent 40%);
        }
        /* 4. СТИЛИ ДЛЯ ШАПКИ (Header) */
        .top-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 20px 15px;
            background: linear-gradient(180deg, rgba(5,5,10,0.9) 0%, transparent 100%);
            z-index: 10;
        }

        /* 5. КОСМИЧЕСКИЙ ЛОГОТИП (Обновленный) */
        .logo-box {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            width: 36px;
            height: 36px;
            background: rgba(0, 87, 255, 0.15); /* Полупрозрачный фон */
            border: 1px solid rgba(0, 240, 255, 0.5); /* Неоновая рамка */
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: 900;
            font-size: 20px;
            color: #fff;
            /* Эффект дыхания и внутреннего свечения */
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.5), inset 0 0 10px rgba(0, 87, 255, 0.6);
            backdrop-filter: blur(5px);
            animation: pulse-glow 2.5s infinite alternate;
        }

        @keyframes pulse-glow {
            0% { box-shadow: 0 0 10px rgba(0, 240, 255, 0.3), inset 0 0 5px rgba(0, 87, 255, 0.4); }
            100% { box-shadow: 0 0 25px rgba(0, 240, 255, 0.8), inset 0 0 15px rgba(0, 87, 255, 0.8); }
        }

        .logo-text {
            font-size: 24px;
            font-weight: 900;
            letter-spacing: 3px;
            text-transform: uppercase;
            /* Градиент от белого к неоново-синему */
            background: linear-gradient(to right, #ffffff 20%, var(--neon-blue) 80%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 30px rgba(0, 240, 255, 0.3);
        }
        /* 6. ПРЕМИУМ МЕНЮ (Floating Glass Nav) */
        .bottom-nav {
            position: fixed;
            bottom: 25px; /* Висит в воздухе, а не прилипает к краю */
            left: 50%;
            transform: translateX(-50%);
            width: 92%; /* Немного не достает до краев экрана */
            max-width: 500px;
            height: 65px;
            background: rgba(5, 10, 20, 0.65);
            backdrop-filter: blur(25px); /* Сильное размытие фона */
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(0, 240, 255, 0.15);
            border-radius: 20px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8), 0 0 15px rgba(0, 87, 255, 0.2);
            z-index: 100;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            width: 14%;
            height: 100%;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); /* Пружинистая анимация */
            position: relative;
        }

        .nav-icon {
            font-size: 22px;
            margin-bottom: 0;
            transition: all 0.4s ease;
            filter: grayscale(100%) opacity(0.5); /* Серые пока неактивны */
        }

        .nav-text {
            font-size: 9px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.3s ease;
            position: absolute;
            bottom: 6px;
        }

        /* 7. АНИМАЦИЯ НАЖАТИЯ МЕНЮ */
        .nav-item.active {
            color: #fff;
        }

        .nav-item.active .nav-icon {
            transform: translateY(-12px) scale(1.2); /* Выпрыгивает вверх */
            filter: grayscale(0%) opacity(1);
            text-shadow: 0 0 15px var(--neon-blue);
        }

        .nav-item.active .nav-text {
            opacity: 1;
            transform: translateY(0);
            color: var(--neon-blue);
        }

        /* Светящаяся полоска над активной кнопкой */
        .nav-item::before {
            content: '';
            position: absolute;
            top: -1px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 3px;
            background: var(--neon-blue);
            box-shadow: 0 0 10px var(--neon-blue), 0 0 20px var(--dark-blue);
            transition: width 0.3s ease;
            border-radius: 0 0 4px 4px;
        }

        .nav-item.active::before {
            width: 50%;
        }

        /* 8. СТИЛИ ОБЛАСТИ КОНТЕНТА */
        .content-area {
            flex-grow: 1;
            overflow-y: auto;
            padding: 15px 20px 110px; /* Большой отступ снизу из-за парящего меню */
        }

        .tab {
            display: none;
            /* Космическое появление вкладок с легким блюром */
            animation: cosmicFade 0.5s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }

        .tab.active {
            display: block;
        }

        @keyframes cosmicFade {
            from { opacity: 0; transform: scale(0.95) translateY(20px); filter: blur(5px); }
            to { opacity: 1; transform: scale(1) translateY(0); filter: blur(0); }
        }
        /* 9. ВНУТРЕННОСТИ: ТУРНИРЫ (Карточки) */
        .page-title {
            font-size: 28px;
            font-weight: 900;
            margin-bottom: 20px;
            text-transform: uppercase;
            text-shadow: 0 0 20px rgba(0, 87, 255, 0.8);
            letter-spacing: 1px;
        }

        .tournament-card {
            background: rgba(10, 15, 30, 0.4); /* Стеклянный фон */
            border: 1px solid rgba(0, 240, 255, 0.15); /* Тонкая синяя рамка */
            border-radius: 16px;
            padding: 18px;
            margin-bottom: 20px;
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
        }

        /* Неоновая полоска слева от карточки */
        .tournament-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            background: var(--neon-blue);
            box-shadow: 0 0 15px var(--neon-blue);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        /* Статусы турнира */
        .status-badge {
            font-size: 10px;
            font-weight: 800;
            padding: 5px 12px;
            border-radius: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .status-open {
            background: rgba(0, 240, 255, 0.1);
            color: var(--neon-blue);
            border: 1px solid rgba(0, 240, 255, 0.4);
            box-shadow: 0 0 10px rgba(0, 240, 255, 0.2);
        }

        .status-live {
            background: rgba(255, 42, 42, 0.15);
            color: #ff2a2a;
            border: 1px solid rgba(255, 42, 42, 0.5);
            animation: pulse-red 2s infinite; /* Эффект пульсации для Live матчей */
        }

        @keyframes pulse-red {
            0% { box-shadow: 0 0 5px rgba(255, 42, 42, 0.2); }
            50% { box-shadow: 0 0 15px rgba(255, 42, 42, 0.6); }
            100% { box-shadow: 0 0 5px rgba(255, 42, 42, 0.2); }
        }

        .prize-pool {
            font-size: 16px;
            font-weight: 900;
            color: #ffd700; /* Золотой цвет для голды */
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
        }

        .card-title {
            font-size: 20px;
            font-weight: 900;
            margin-bottom: 8px;
            color: #fff;
            letter-spacing: 0.5px;
        }

        .card-info {
            display: flex;
            gap: 15px;
            margin-bottom: 18px;
            font-size: 12px;
            color: var(--text-muted);
            font-weight: 600;
        }

        .card-btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(90deg, var(--dark-blue), var(--neon-blue));
            color: #fff;
            font-weight: 800;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            cursor: pointer;
            box-shadow: 0 5px 20px rgba(0, 87, 255, 0.4);
            transition: all 0.3s ease;
        }

        .card-btn:active {
            transform: scale(0.97); /* Кнопка красиво прожимается */
        }

        /* Кнопка для просмотра сетки (прозрачная) */
        .btn-outline {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: none;
        }
    </style>
</head>
<body>
    <header class="top-header">
        <div class="logo-box">
            <div class="logo-icon">V</div>
            <div class="logo-text">Vertex</div>
        </div>
    </header>

    <div class="content-area">
        <div id="tab-tournaments" class="tab active">
            </div>
        
        <div id="tab-news" class="tab"></div>
        <div id="tab-profile" class="tab"></div>
        <div id="tab-tribunal" class="tab"></div>
        <div id="tab-apply" class="tab"></div>
        <div id="tab-chat" class="tab"></div>
        <div id="tab-admin" class="tab"></div>
    </div>

    <div class="bottom-nav">
        <div class="nav-item active" onclick="switchTab('tournaments', this)">
            <div class="nav-icon">🏆</div>
            <div class="nav-text">Игры</div>
        </div>
        <div class="nav-item" onclick="switchTab('news', this)">
            <div class="nav-icon">📰</div>
            <div class="nav-text">Лента</div>
        </div>
        <div class="nav-item" onclick="switchTab('profile', this)">
            <div class="nav-icon">👤</div>
            <div class="nav-text">Профиль</div>
        </div>
        <div class="nav-item" onclick="switchTab('tribunal', this)">
            <div class="nav-icon">🔨</div>
            <div class="nav-text">Баны</div>
        </div>
        <div class="nav-item" onclick="switchTab('apply', this)">
            <div class="nav-icon">📝</div>
            <div class="nav-text">Заявка</div>
        </div>
        <div class="nav-item" onclick="switchTab('chat', this)">
            <div class="nav-icon">💬</div>
            <div class="nav-text">Чат</div>
        </div>
        <div class="nav-item" onclick="switchTab('admin', this)">
            <div class="nav-icon">👑</div>
            <div class="nav-text">Админ</div>
        </div>
    </div>

    <div id="tab-tournaments" class="tab active">
            <h1 class="page-title">События</h1>
            
            <div class="tournament-card">
                <div class="card-header">
                    <span class="status-badge status-open">Набор</span>
                    <span class="prize-pool">🏆 5000G</span>
                </div>
                <div class="card-title">VERTEX MAJOR 5v5</div>
                <div class="card-info">
                    <div class="info-item">🗺️ Sandstone</div>
                    <div class="info-item">👥 Команд: 12/16</div>
                </div>
                <button class="card-btn" onclick="if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium')">Регистрация</button>
            </div>

            <div class="tournament-card" style="border-left-color: #ff2a2a;">
                <div class="card-header">
                    <span class="status-badge status-live">🔴 LIVE (Финал)</span>
                    <span class="prize-pool">🏆 2000G</span>
                </div>
                <div class="card-title">NIGHT CUP 2v2</div>
                <div class="card-info">
                    <div class="info-item">⚔️ Horizon vs Empire</div>
                </div>
                <button class="card-btn btn-outline" onclick="if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium')">Смотреть сетку</button>
            </div>
            
            <div class="tournament-card" style="border-left-color: #555; opacity: 0.7;">
                <div class="card-header">
                    <span class="status-badge" style="background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: #ccc;">Завершен</span>
                </div>
                <div class="card-title" style="color: #ccc;">DUEL MASTERS 1v1</div>
                <div class="card-info">
                    <div class="info-item">Победитель: 🥇 s1mple_pro</div>
                </div>
            </div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        function switchTab(tabId, element) {
            // Убираем активность со всех вкладок
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            
            // Включаем нужную вкладку
            document.getElementById('tab-' + tabId).classList.add('active');
            element.classList.add('active');
            
            // Легкая вибрация телефона при нажатии (Haptic Feedback)
            if(tg.HapticFeedback) {
                tg.HapticFeedback.impactOccurred('light');
            }
        }
    </script>
    </body>
</html>
